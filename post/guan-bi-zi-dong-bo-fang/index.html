            <h2 class="post-title">关闭自动播放和系统自带的远程协助提高系统安全</h2>
            <div class="post-date">2023-12-16</div>
            
            <div class="post-content" v-pre>
              <p>找到控制面板里的“自动播放”，把“为所有媒体和设备使用自动播放”前面的勾去掉，可以防止U盘里的病毒自动运行。</p>
<!-- more -->
<figure data-type="image" tabindex="1"><img src="https://blog.dddy.cn/post-images/1702727622665.jpg" alt="" loading="lazy"></figure>
<p>打开控制面板里的“系统”，或是在桌面上右键“此电脑（计算机）”选择“属性”，点击“远程设置”或“系统高级设置”，在弹出的新窗口里点击“远程”选项卡，把“允许远程协助连接这台计算机”前面的勾去掉，然后应用即可。<br>
<img src="https://blog.dddy.cn/post-images/1702727643904.jpg" alt="" loading="lazy"></p>
